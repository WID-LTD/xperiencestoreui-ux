[build]
  # The directory to change to before starting a build.
  # This is where your frontend code lives.
  base = "frontend"

  # The directory that contains the deploy-ready HTML/JS/CSS assets after the build.
  # Since it's a static site, it's just the base directory itself.
  publish = "."

  # The command to run to build your site. 
  # Leave empty if you don't have a build step (vanilla JS).
  command = ""

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  # This rule ensures that all request paths that don't match a file 
  # will be redirected to index.html, allowing the SPA router to handle them.
  from = "/*"
  to = "/index.html"
  status = 200
