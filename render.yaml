services:
  - type: web
    name: xperiencestore-backend
    env: node
    plan: free 
    buildCommand: npm install
    startCommand: node server/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: xperiencestore-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CLOUDFLARE_R2_ACCESS_KEY_ID
        sync: false
      - key: CLOUDFLARE_R2_SECRET_ACCESS_KEY
        sync: false
      - key: CLOUDFLARE_R2_BUCKET_NAME
        value: xperiencestore
      - key: CLOUDFLARE_R2_ACCOUNT_ID
        sync: false

databases:
  - name: xperiencestore-db
    plan: free
